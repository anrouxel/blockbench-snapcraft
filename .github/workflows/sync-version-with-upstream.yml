name: 🔄 Sync version with upstream

on:
  # Runs at 10:00 UTC every day
  schedule:
    - cron:  '0 10 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


jobs:
  sync-version:
    name: "Update snapcraft.yaml"
    environment: "Candidate Branch"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.SNAPCRAFTERS_BOT_COMMIT }}
      - name: Fetch release version
        run: |
          TAGS=$(git ls-remote --tags https://github.com/JannisX11/blockbench.git | awk '{print $2}' | grep -v '{}' | grep -v '\^{}' | cut -d '/' -f 3)
          VERSION=$(echo "$TAGS" | grep -v beta | grep -v '\^{}' | grep -v '{}' | grep -v '~' | sort -t. -k 1,1n -k 2,2n -k 3,3n -k 4,4n | tail -n 1 | sed 's/^v//')
          sed -i 's/^\(version: \).*$/\1'"$VERSION"'/' snap/snapcraft.yaml
      - name: Check for modified files
        id: git-check
        run: |
          MODIFIED=$([ -z "`git status --porcelain`" ] && echo "false" || echo "true")
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
      - name: Commit latest release version
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.name ${{ secrets.BOT_USERNAME }}
          git config --global user.email ${{ secrets.BOT_EMAIL }}
          git commit -am "Automatic sync to latest release"
          git push
    outputs:
      modified: ${{ steps.git-check.outputs.modified }}
  call-snap-store-publish-to-candidate:
    name: "Call"
    needs: sync-version
    if: needs.sync-version.outputs.modified == 'true'
    # Permissions needed by the called workflow
    permissions:
      contents: read
      issues: write
    secrets:
      SNAP_STORE_CANDIDATE: ${{ secrets.STORE_LOGIN }}
    uses: ./.github/workflows/snap-store-publish-to-stable.yml
