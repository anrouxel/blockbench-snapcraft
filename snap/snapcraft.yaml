name: blockbench-snapcraft
icon: snap/gui/blockbench_logo.png
license: GPL-3.0
summary: Blockbench - A boxy 3D model editor
description: |
  Blockbench - A boxy 3D model editor
base: core20
grade: stable
confinement: strict

adopt-info: blockbench-snapcraft

architectures:
#  - build-on: arm64
#  - build-on: armhf
  - build-on: amd64

apps:
  blockbench-snapcraft:
    extensions: [gnome-3-38]
    command: electron/Blockbench --no-sandbox
    environment:
      TMPDIR: $XDG_RUNTIME_DIR
      GSETTINGS_SCHEMA_DIR: $SNAP/usr/share/glib-2.0/schemas
      XDG_CURRENT_DESKTOP: Unity
      DISABLE_WAYLAND: 1
    plugs:
      - desktop
      - desktop-legacy
      - home
      - opengl
      - x11
      - unity7
      - wayland
      - browser-support
      - network
      - gsettings
      - pulseaudio

parts:
  libxkbcommon-x11-0:
    plugin: nil
    stage-packages:
      - libxkbcommon-x11-0
    prime:
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libxkbcommon*.so*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libxkbcommon-x11*.so*
      
  blockbench-snapcraft:
    after: [libxkbcommon-x11-0]
    plugin: nil
    source: https://github.com/JannisX11/blockbench.git
    source-type: git
    override-pull: |
      snapcraftctl pull
      snapcraftctl set-version "$(git describe --tags | sed 's/v//' | sed "s/-g/%/"  | cut -d "%" -f1)"
    build-environment:
      - PATH: "$PATH:$SNAPCRAFT_PART_BUILD/node_modules/.bin"
    override-build: |
      set +u # core20 base does not allow unbound variables !
      # workaround for build.snapcraft.io builds
      # https://bugs.launchpad.net/bugs/1886861
      if [ -n "$http_proxy" ]; then
        export ELECTRON_GET_USE_PROXY=1
        export GLOBAL_AGENT_HTTP_PROXY="${http_proxy}"
        export GLOBAL_AGENT_HTTPS_PROXY="${http_proxy}"
      fi
      git checkout "$(git describe --tags)" -b latest
      npm install
      npm i electron-packager
      npx electron-packager . --overwrite --platform=linux --output=release-build \
          --prune=true --out $SNAPCRAFT_PART_INSTALL/
      mv $SNAPCRAFT_PART_INSTALL/Blockbench-linux-* \
          $SNAPCRAFT_PART_INSTALL/electron
    build-packages:
      - git
      - sed
    build-snaps:
      - node/14/stable
    stage-packages:
      - libgtk-3-0
      - xdg-utils
      - libatspi2.0-0
      - libuuid1
      - libsecret-1-0
      - giblib1
      - libimlib2
      - libasound2
      - libgconf2-4
      - libnotify4
      - libnspr4
      - libnss3
      - libpcre3
      - libpulse0
      - libxss1
      - libxtst6
      - libpng++-dev
      - libx11-dev
      - libxtst-dev
      - libxt-dev
      - libx11-xcb-dev
      - libxkbcommon-dev
      - libxkbcommon-x11-dev
