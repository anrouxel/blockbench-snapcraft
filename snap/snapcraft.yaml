name: blockbench-snapcraft
icon: snap/gui/blockbench_logo.png
license: GPL-3.0
summary: Blockbench - A boxy 3D model editor
description: |
  Blockbench - A boxy 3D model editor
base: core22
grade: stable
confinement: strict

adopt-info: blockbench-snapcraft

architectures:
  - build-on: amd64
    build-for: amd64

layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/imlib2:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/imlib2

apps:
  blockbench-snapcraft:
    extensions: [gnome]
    command: electron/Blockbench --no-sandbox
    environment:
      TMPDIR: $XDG_RUNTIME_DIR
      PATH: '$SNAP/usr/sbin:$SNAP/usr/bin:$SNAP/sbin:$SNAP/bin:$PATH'
      LD_LIBRARY_PATH: '$SNAP_LIBRARY_PATH:$SNAP/lib:$SNAP/usr/lib:$SNAP/lib/$SNAPCRAFT_ARCH_TRIPLET:$SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET:$LD_LIBRARY_PATH:$SNAP/lib:$SNAP/usr/lib:$SNAP/lib/$SNAPCRAFT_ARCH_TRIPLET:$SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET'
    plugs:
      - desktop
      - desktop-legacy
      - home
      - opengl
      - x11
      - unity7
      - wayland
      - browser-support
      - network
      - gsettings
      - pulseaudio
      - audio-playback

parts:      
  blockbench-snapcraft:
    plugin: npm
    source: https://github.com/JannisX11/blockbench.git
    source-type: git
    override-pull: |
      craftctl default
      git checkout "$(git describe --tags `git rev-list --tags --max-count=1`)" -b latest
      craftctl set version="$(git describe --tags | sed 's/v//' | sed "s/-g/%/"  | cut -d "%" -f1)"
    build-packages:
      - git
      - sed
    build-snaps:
      - node/14/stable
    stage-packages:
      - libgtk-3-0
      - libnotify4
      - libnss3
      - libxss1
      - libxtst6
      - xdg-utils
      - libatspi2.0-0
      - libuuid1
      - libsecret-1-0
      - libnspr4
      - giblib1
      - libimlib2
      - libx11-6
      - libxcursor1
      - libxfixes3
      - scrot
      - libasound2
      - libgconf-2-4
      - libunity9
