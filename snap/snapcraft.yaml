name: blockbench-snapcraft
license: GPL-3.0
summary: Blockbench - A boxy 3D model editor
description: |
  Blockbench - A boxy 3D model editor
base: core20
grade: stable
confinement: strict

adopt-info: blockbench-snapcraft

architectures:
  - build-on: arm64
  - build-on: armhf
  - build-on: amd64

apps:
  blockbench-snapcraft:
    extensions: [gnome-3-38]
    command: electron/Blockbench --no-sandbox
    environment:
      DISABLE_WAYLAND: 1
      TMPDIR: $XDG_RUNTIME_DIR
      LD_LIBRARY_PATH: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libunity
    plugs:
      - audio-playback
      - audio-record
      - browser-support
      - home
      - network
      - network-bind
      - unity7

parts:
  blockbench-snapcraft:
    plugin: nil
    source: https://github.com/JannisX11/blockbench.git
    source-type: git
    override-pull: |
      snapcraftctl pull
      snapcraftctl set-version "$(git describe --tags | sed 's/v//' | sed "s/-g/%/"  | cut -d "%" -f1)"
    build-environment:
      - PATH: "$PATH:$SNAPCRAFT_PART_BUILD/node_modules/.bin"
    override-build: |
      set +u # core20 base does not allow unbound variables !
      # workaround for build.snapcraft.io builds
      # https://bugs.launchpad.net/bugs/1886861
      if [ -n "$http_proxy" ]; then
        export ELECTRON_GET_USE_PROXY=1
        export GLOBAL_AGENT_HTTP_PROXY="${http_proxy}"
        export GLOBAL_AGENT_HTTPS_PROXY="${http_proxy}"
      fi
      npm install
      npm i electron-packager
      npx electron-packager . --overwrite --platform=linux --output=release-build \
          --prune=true --out $SNAPCRAFT_PART_INSTALL/
      mv $SNAPCRAFT_PART_INSTALL/Blockbench-linux-* \
          $SNAPCRAFT_PART_INSTALL/electron
    build-packages:
      - git
      - sed
    build-snaps:
      - node/14/stable
    stage-packages:
      - libasound2
      - libgconf-2-4
      - libnss3
      - libunity9 # for badgeCount in dock
      - libx11-xcb1
      - libxss1
      - libxtst6